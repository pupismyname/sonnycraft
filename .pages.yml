media: media
components:
  image:
    type: object
    label: Image
    fields:
      - name: image
        label: Image
        type: image
        media: media
        rename: safe
      - name: title
        label: Title
        type: string
      - name: description
        type: rich-text
content:
  - name: gallery
    label: Gallery
    type: collection
    path: content
    fields:
      - name: title
        label: Title
        type: string
      - name: date
        label: Date
        type: date
        time: true
        format: yyyy-MM-dd'T'HH:mm
      - name: images
        label: Images
        component: image
        list: true
      - name: body
        label: Body
        type: rich-text
      - name: tags
        label: Tags
        type: string
        list: true